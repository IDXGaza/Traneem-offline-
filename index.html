<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8fafb" id="theme-color-meta">
    <title>ترانيم - Traneem</title>
    <link rel="stylesheet" href="/cairo.css">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/favicon-48.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.querySelector('#theme-color-meta').setAttribute('content', '#000000');
      } else {
        document.documentElement.classList.remove('dark');
        document.querySelector('#theme-color-meta').setAttribute('content', '#f8fafb');
      }
    </script>
    <script type="module" crossorigin src="/main.js"></script>
    <link rel="stylesheet" crossorigin href="/main.css">
  </head>
  <body class="bg-[#f8fafb] dark:bg-black transition-colors duration-300">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
